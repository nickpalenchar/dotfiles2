- defaults:
    link:
      relink: true
      backup: true

- clean: ['~']

- link:
    ~/.zshrc: .zshrc
    ~/.vimrc: .vimrc
    ~/.talon/user/nick: talon-nick


- create:
    - ~/.vim/undo-history
    - ~/.talon/user/nick

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  - [test -d ~/.talon/user/community || git clone git@github.com:talonhub/community.git ~/.talon/user/community]
  - [test -d ~/.talon/user/talon_hud || git clone https://github.com/chaosparrot/talon_hud ~/.talon/user/talon_hud]
